<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){try{var t=localStorage.getItem("vistex-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<title>Contact Vistex Chemicals Ltd — Request a Quote</title>
<meta name="description" content="Contact Vistex Chemicals Ltd for a free hygiene assessment, product demonstration or quote. Phone, WhatsApp and email.">
<link rel="icon" type="image/png" href="images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" onerror="this.remove()">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/motion.css">
<link rel="stylesheet" href="css/home.css">
</head>
<body data-page="contact">
<div id="vx-loader" aria-hidden="true"><div class="vx-loader-bubbles" id="vxLoaderBubbles"></div><div class="vx-loader-inner">
  <img class="vx-loader-logo l-light" src="images/logo/vistex-logo-color-on-white.png" alt="Vistex Chemicals">
  <img class="vx-loader-logo l-dark" src="images/logo/vistex-logo-white-on-blue.png" alt="Vistex Chemicals">
  <div class="vx-drops"><span></span><span></span><span></span></div>
  <div class="vx-loader-bar"><span></span></div>
  <div class="vx-loader-text">Pure hygiene, loading…</div>
</div></div>
<main id="main" class="section">
  <div class="container">
    <span class="eyebrow">Contact</span>
    <h1 class="h-display" data-anim="up">Let’s build your hygiene program</h1>
    <p class="lede measure" data-anim="up" style="margin-top:14px">Request a free assessment, product demonstration or quote. We respond fast.</p>

    <div class="grid grid-2" style="margin-top:40px;gap:40px;align-items:start">
      <div class="reveal-parent" id="contactInfo" style="display:grid;gap:14px"></div>

      <form class="card" id="contactForm" data-anim="right" style="padding:28px;display:grid;gap:14px">
        <div class="row2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <label style="display:grid;gap:6px;font-size:14px;font-weight:600">Your name
            <input name="name" required style="padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)"></label>
          <label style="display:grid;gap:6px;font-size:14px;font-weight:600">Hotel / business
            <input name="business" style="padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)"></label>
        </div>
        <label style="display:grid;gap:6px;font-size:14px;font-weight:600">Phone
          <input name="phone" required style="padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)"></label>
        <label style="display:grid;gap:6px;font-size:14px;font-weight:600">Message
          <textarea name="message" rows="4" required placeholder="Tell us about your property and what you need…" style="padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)"></textarea></label>
        <button type="submit" class="btn btn-wa" style="width:100%">Send via WhatsApp</button>
        <p class="center" style="font-size:12.5px;color:var(--text-3)">Opens WhatsApp with your message pre-filled.</p>
      </form>
    </div>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/partials.js"></script>
<script src="js/cart.js"></script>
<script>
(function(){var V=window.VISTEX,co=V.company;
  function row(ico,label,value,href){
    var inner='<div class="card" style="display:flex;align-items:center;gap:16px;padding:16px">'+
      '<span class="contact-ico">'+window.icon(ico,22)+'</span><div><div class="pcard-pack">'+label+'</div>'+
      '<div style="font-weight:700;margin-top:2px">'+value+'</div></div></div>';
    return href?'<a href="'+href+'" target="_blank" rel="noreferrer">'+inner+'</a>':inner;
  }
  document.getElementById('contactInfo').innerHTML =
    '<div data-anim="up">'+row('phone','Phone',co.phoneDisplay,'tel:'+co.phoneIntl)+'</div>'+
    '<div data-anim="up">'+row('chat','WhatsApp','Chat with our team','https://wa.me/'+co.phoneIntl)+'</div>'+
    '<div data-anim="up">'+row('mail','Email',co.email,'mailto:'+co.email)+'</div>'+
    '<div data-anim="up">'+row('globe','Website',co.website,null)+'</div>'+
    '<div data-anim="up">'+row('pin','Address',co.address,null)+'</div>'+
    '<div class="card" data-anim="up" style="background:var(--surface-2);padding:22px">'+
      '<h3 class="sys-title" style="font-family:var(--head);font-size:16px">What you get with Vistex</h3>'+
      '<ul style="list-style:none;margin-top:10px;display:grid;gap:6px;color:var(--text-2);font-size:14px">'+
      '<li>• Product demonstrations</li><li>• Staff training & usage guides</li>'+
      '<li>• On-site support</li><li>• Ongoing performance checks</li></ul></div>';

  document.getElementById('contactForm').addEventListener('submit',function(e){
    e.preventDefault();
    var f=e.target;
    var text='*Website enquiry — Vistex Chemicals*\n\nName: '+f.name.value+'\nBusiness: '+f.business.value+
      '\nPhone: '+f.phone.value+'\n\n'+f.message.value;
    window.open('https://wa.me/'+co.phoneIntl+'?text='+encodeURIComponent(text),'_blank');
  });
})();
</script>
<script src="js/motion.js"></script>
</body>
</html>
